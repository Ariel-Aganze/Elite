services:
  - type: web
    name: elite-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: elite-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: elite-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://elite.onrender.com

databases:
  - name: elite-db
    plan: free